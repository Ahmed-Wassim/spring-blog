services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blog
    ports:
      - "5433:5432"  # host:container (use 5433 on host to avoid conflicts)
    restart: always

  adminer:
    image: adminer:latest
    ports:
      - "8888:8888"
    restart: always
